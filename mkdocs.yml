site_name: Azure Functions Python Cookbook
site_description: Practical recipes and examples for Azure Functions Python
site_author: Yeongseon Choe
repo_url: https://github.com/yeongseon/azure-functions-python-cookbook
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Getting Started: getting-started.md
  - Recipes:
      - Overview: recipes/index.md
      - HTTP API Basic: recipes/http-api-basic.md
      - HTTP API with OpenAPI: recipes/http-api-openapi.md
      - GitHub Webhook: recipes/github-webhook.md
      - Queue Worker: recipes/queue-worker.md
      - Timer Job: recipes/timer-job.md
  - User Guide:
      - Usage: usage.md
      - Architecture: architecture.md
      - Roadmap: roadmap.md
  - Contributing:
      - Development: development.md
      - Testing: testing.md
      - Guidelines: contributing.md
  - Troubleshooting: troubleshooting.md
  - FAQ: faq.md
  - Security: security.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
      toc_depth: 3
  - tables
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.inlinehilite

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yeongseon/azure-functions-python-cookbook
  copyright: |
    © 2026 Yeongseon Choe – MIT Licensed
