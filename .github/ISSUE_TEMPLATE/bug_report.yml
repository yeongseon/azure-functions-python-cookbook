name: Bug Report
description: Report a bug in a recipe or example
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug here...
    validations:
      required: true

  - type: input
    id: recipe_name
    attributes:
      label: Recipe Name
      description: Which recipe or example is affected?
      placeholder: e.g., HTTP Trigger with Blob Storage
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to...
        2. Run...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: The function should...
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: The function actually...
    validations:
      required: true

  - type: dropdown
    id: python_version
    attributes:
      label: Python Version
      options:
        - Python 3.10
        - Python 3.11
        - Python 3.12
        - Python 3.13
        - Python 3.14
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true

  - type: input
    id: azure_functions_tools_version
    attributes:
      label: Azure Functions Core Tools Version
      description: Output of `func --version`
      placeholder: e.g., 4.0.5455
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Any other context about the problem.
      placeholder: Include error messages, logs, or screenshots if relevant
    validations:
      required: false
